  <text x="26" y="196" font-size="13">Instagram</text><text x="500" y="196" fill="#c00000" font-size="13" font-weight="bold" text-anchor="end">недоступен</text>
  <text x="26" y="220" font-size="13">Discord</text><text x="500" y="220" fill="#c00000" font-size="13" font-weight="bold" text-anchor="end">недоступен</text>
