<svg xmlns="http://www.w3.org/2000/svg" width="540" height="360" viewBox="0 0 540 360" font-family="'MS Sans Serif',sans-serif">
  <rect x="0" y="0" width="540" height="360" fill="#c0c0c0"/>
  <rect x="2" y="2" width="536" height="356" fill="none" stroke="#dfdfdf" stroke-width="2"/>
  <rect x="0" y="0" width="540" height="360" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="5" y="5" width="530" height="26" fill="#000080"/>
  <text x="13" y="23" fill="#fff" font-size="14" font-weight="bold">YouTube — Проигрыватель</text>
  <rect x="490" y="9" width="18" height="18" fill="#c0c0c0" stroke="#000"/><text x="495" y="23" font-size="12">_</text>
  <rect x="510" y="9" width="18" height="18" fill="#c0c0c0" stroke="#000"/><text x="514" y="22" font-size="11">×</text>
  <!-- экран плеера -->
  <rect x="20" y="44" width="500" height="240" fill="#181818"/>
  <!-- красная кнопка play -->
  <circle cx="270" cy="150" r="42" fill="#ff0000"/>
  <path d="M255 128 L255 172 L292 150 Z" fill="#fff"/>
  <!-- спиннер буферизации -->
  <text x="270" y="225" fill="#fff" font-size="15" text-anchor="middle">Буферизация… 0:03 / 12:40</text>
  <!-- полоса прогресса с буфером -->
  <rect x="40" y="250" width="460" height="6" fill="#444"/>
  <rect x="40" y="250" width="70" height="6" fill="#ff0000"/>
  <rect x="110" y="250" width="40" height="6" fill="#888"/>
  <!-- качество 144p бейдж -->
  <rect x="430" y="56" width="76" height="22" fill="#000" opacity="0.7"/>
  <text x="468" y="71" fill="#ff5555" font-size="13" text-anchor="middle" font-weight="bold">144p ▼</text>
  <!-- нижняя панель статуса -->
  <rect x="10" y="292" width="520" height="58" fill="#c0c0c0" stroke="#808080"/>
  <text x="22" y="312" fill="#000" font-size="13" font-weight="bold">⚠ Замедление трафика провайдером (DPI/ТСПУ)</text>
  <text x="22" y="332" fill="#000080" font-size="12">Скорость к серверам YouTube искусственно занижена</text>
</svg>
