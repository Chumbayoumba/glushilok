<svg xmlns="http://www.w3.org/2000/svg" width="540" height="360" viewBox="0 0 540 360" font-family="'MS Sans Serif',sans-serif">
  <rect x="0" y="0" width="540" height="360" fill="#c0c0c0"/>
  <rect x="2" y="2" width="536" height="356" fill="none" stroke="#dfdfdf" stroke-width="2"/>
  <rect x="0" y="0" width="540" height="360" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="5" y="5" width="530" height="26" fill="#000080"/>
  <text x="13" y="23" fill="#fff" font-size="14" font-weight="bold">WhatsApp — Настройки прокси</text>
  <rect x="490" y="9" width="18" height="18" fill="#c0c0c0" stroke="#000"/><text x="495" y="23" font-size="12">_</text>
  <rect x="510" y="9" width="18" height="18" fill="#c0c0c0" stroke="#000"/><text x="514" y="22" font-size="11">×</text>
  <!-- зелёная шапка whatsapp -->
  <rect x="14" y="40" width="512" height="40" fill="#075e54"/>
  <circle cx="40" cy="60" r="14" fill="#25d366"/>
  <path d="M33 60 a7 7 0 1 1 7 7 l-7 2 2-6 z" fill="#fff"/>
  <text x="64" y="65" fill="#fff" font-size="15" font-weight="bold">Хранилище и данные → Прокси</text>
  <!-- форма -->
  <rect x="14" y="86" width="512" height="200" fill="#ece5dd"/>
  <text x="30" y="114" fill="#000" font-size="13">Использовать прокси</text>
  <rect x="430" y="100" width="40" height="20" rx="10" fill="#25d366"/><circle cx="462" cy="110" r="9" fill="#fff"/>
  <text x="30" y="150" fill="#333" font-size="12">Адрес прокси-сервера:</text>
  <rect x="30" y="158" width="480" height="26" fill="#fff" stroke="#888"/>
  <text x="38" y="176" fill="#000080" font-size="13" font-family="'Courier New',monospace">proxy.example.net : 443</text>
  <text x="30" y="212" fill="#333" font-size="12">Статус:</text>
  <text x="90" y="212" fill="#c00000" font-size="13" font-weight="bold">✖ сервер недоступен / звонки не идут</text>
  <rect x="30" y="228" width="220" height="34" fill="#c0c0c0" stroke="#000"/>
  <text x="140" y="250" fill="#000" font-size="13" text-anchor="middle">Сохранить прокси</text>
  <text x="270" y="250" fill="#000080" font-size="12">← публичные быстро банятся</text>
  <!-- статус-бар -->
  <rect x="10" y="292" width="520" height="58" fill="#c0c0c0" stroke="#808080"/>
  <text x="22" y="312" fill="#000" font-size="13" font-weight="bold">✔ Надёжнее: VPN на VLESS Reality</text>
  <text x="22" y="332" fill="#000080" font-size="12">Возвращает и переписку, и голосовые/видеозвонки</text>
</svg>
