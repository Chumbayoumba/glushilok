<svg xmlns="http://www.w3.org/2000/svg" width="520" height="360" viewBox="0 0 520 360" font-family="'MS Sans Serif',Tahoma,sans-serif">
  <rect x="0" y="0" width="520" height="360" fill="#c0c0c0"/>
  <rect x="0" y="0" width="520" height="360" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="2" y="2" width="516" height="356" fill="none" stroke="#dfdfdf" stroke-width="2"/>
  <!-- титул -->
  <rect x="5" y="5" width="510" height="28" fill="#000080"/>
  <text x="14" y="24" fill="#fff" font-size="15" font-weight="bold">AmneziaVPN — AmneziaWG 2.0</text>
  <rect x="430" y="9" width="20" height="20" fill="#c0c0c0" stroke="#000"/><text x="435" y="24" font-size="13">_</text>
  <rect x="452" y="9" width="20" height="20" fill="#c0c0c0" stroke="#000"/><text x="457" y="23" font-size="12">□</text>
  <rect x="474" y="9" width="20" height="20" fill="#c0c0c0" stroke="#000"/><text x="479" y="24" font-size="13" font-weight="bold">×</text>
  <!-- большой круглый индикатор подключения -->
  <circle cx="260" cy="130" r="64" fill="#d4d0c8" stroke="#808080" stroke-width="3"/>
  <circle cx="260" cy="130" r="54" fill="#00a000" stroke="#006000" stroke-width="2"/>
  <text x="260" y="124" fill="#fff" font-size="15" font-weight="bold" text-anchor="middle">VPN</text>
  <text x="260" y="144" fill="#fff" font-size="13" text-anchor="middle">ВКЛ</text>
  <text x="260" y="216" font-size="15" font-weight="bold" text-anchor="middle" fill="#008000">● Подключено</text>
  <!-- протокол -->
  <rect x="60" y="236" width="400" height="34" fill="#fff" stroke="#808080" stroke-width="2"/>
  <text x="72" y="258" font-size="13">Протокол:  AmneziaWG 2.0  (маскировка под UDP)</text>
  <!-- сервер -->
  <rect x="60" y="276" width="400" height="34" fill="#fff" stroke="#808080" stroke-width="2"/>
  <text x="72" y="298" font-size="13">Сервер:  ВнеСписка · Нидерланды · 74 ms</text>
  <!-- статусбар -->
  <rect x="5" y="330" width="510" height="24" fill="#c0c0c0" stroke="#808080"/>
  <text x="14" y="346" font-size="11" fill="#000">Обфускация: динамические заголовки + random padding ✓</text>
