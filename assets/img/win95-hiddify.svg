<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300" font-family="Tahoma, sans-serif">
  <!-- окно Win95: серый корпус с бевелом -->
  <rect x="2" y="2" width="516" height="296" fill="#c0c0c0" stroke="#000" stroke-width="2"/>
  <rect x="2" y="2" width="514" height="2" fill="#ffffff"/>
  <rect x="2" y="2" width="2" height="294" fill="#ffffff"/>
  <rect x="2" y="294" width="514" height="2" fill="#808080"/>
  <rect x="514" y="2" width="2" height="294" fill="#808080"/>
  <!-- титульная полоса (синий градиент Win95) -->
  <defs>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000080"/>
      <stop offset="100%" stop-color="#1084d0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="504" height="26" fill="url(#title)"/>
  <text x="16" y="26" font-size="15" font-weight="bold" fill="#ffffff">📡 ГЛУШИЛОК.NET — Hiddify VPN</text>
  <!-- кнопки окна _ ▢ X -->
  <g>
    <rect x="430" y="11" width="20" height="18" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
    <text x="436" y="25" font-size="13" font-weight="bold">_</text>
    <rect x="454" y="11" width="20" height="18" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
    <rect x="459" y="15" width="10" height="10" fill="none" stroke="#000" stroke-width="1.5"/>
    <rect x="478" y="11" width="22" height="18" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
    <text x="483" y="25" font-size="13" font-weight="bold">×</text>
  </g>
  <!-- меню -->
  <text x="14" y="50" font-size="12" fill="#000">Файл&#160;&#160;&#160;Правка&#160;&#160;&#160;Вид&#160;&#160;&#160;Справка</text>
  <!-- рабочая область (белая, утопленная) -->
  <rect x="14" y="58" width="492" height="226" fill="#ffffff" stroke="#808080" stroke-width="2"/>
  <rect x="14" y="58" width="490" height="2" fill="#808080"/>
  <rect x="504" y="58" width="2" height="224" fill="#ffffff"/>
  <!-- содержимое: статус подключения -->
  <text x="34" y="92" font-size="16" font-weight="bold" fill="#008000">● Подключено</text>
  <text x="34" y="120" font-size="13" fill="#000">Профиль: VLESS Reality (glushilok)</text>
  <text x="34" y="142" font-size="13" fill="#000">Протокол: VLESS + Reality + Vision</text>
  <text x="34" y="164" font-size="13" fill="#000">Пинг: 42 ms&#160;&#160;·&#160;&#160;Скорость: 95 Мбит/с</text>
  <!-- большая кнопка Подключить -->
  <rect x="34" y="196" width="200" height="56" fill="#c0c0c0" stroke="#000" stroke-width="2"/>
  <rect x="34" y="196" width="198" height="2" fill="#ffffff"/>
  <rect x="34" y="196" width="2" height="54" fill="#ffffff"/>
  <rect x="34" y="250" width="198" height="2" fill="#808080"/>
  <rect x="232" y="196" width="2" height="54" fill="#808080"/>
  <text x="134" y="230" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">▶ ПОДКЛЮЧИТЬ</text>
  <!-- индикатор трафика -->
  <text x="270" y="214" font-size="12" fill="#000">↓ 1.2 GB</text>
  <text x="270" y="236" font-size="12" fill="#000">↑ 0.3 GB</text>
</svg>
